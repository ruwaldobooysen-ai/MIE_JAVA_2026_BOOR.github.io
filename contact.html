<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

<style>

 *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            outline: none;
            font-family:'Poppins',sans-serif;
        }

        html{
            font-size: 62.5%;
        }

        body{
            width: 100%;
            min-height: 100vh;
            display: flex;
            overflow-x: hidden;
            flex-direction: column;
            background-color: #0f0f0f;
            color: #f1f1f1;
        }

        header{
            margin-top: 20px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 9%;
            background-color: transparent;
            filter: drop-shadow(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

         .logo{
            font-size: 3rem;
            color: #e63946;
            font-weight: 800;
            cursor: pointer;
            transition: 0.5s ease;
        }

        .logo:hover{
            transform:scale(1.1);
        }

        nav a{
            font-size: 1.8rem;
            color: white;
            margin-left: 4rem;
            font-weight: 500;
            transition: 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        nav a:hover,
        nav a.active{
            color: #e63946;
            border-bottom: 3px solid #e63946;
        }

        @media(max-width:955px){
            nav{
                position: absolute;
                top: 0;
                right: 0;
                width: 30%;
                border-left: 3px solid #e63946;
                border-bottom: 3px solid #e63946;
                border-bottom-left-radius: 2rem;
                padding: 1rem solid;
                background-color: #161616;
                border-top: 0.1rem solid rgba(0,0,0,0.1);
            }

            nav.active{
                display: block;
            }

            nav a{
                display: block;
                font-size: 2rem;
                margin: 3rem 0;
            }

            nav a:hover,
            nav a.active{
                padding: 1rem;
                border-radius: 0.5rem;
                border-bottom: 0.5rem solid #e63946;
            }
        }

         /*The styling for my social icons*/
        .social-icons a{
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 4rem;
            height: 4rem;
            background-color: transparent;
            border: 0.2rem solid #e63946;
            font-size: 2rem;
            border-radius: 50%;
            margin: 1rem;
            transition: 0.3s ease;
            color: #e63946;
 
        }

        .social-icons a:hover{
            color: #0f0f0f;
            transform:scale(1.2) translateY(-3px);
            background-color:#e63946;
            box-shadow: 0 0 25px #e63946;
        }

        footer{
            
            align-items: center;
            text-align: center;
            width: 100%;
            margin: 0 auto;
            justify-content: center;
            border-top: 1px solid #2a2a2a;
            padding-top: 20px; 
            background-color: #141414;
            padding-bottom: 20px;
            
        }

        #copyright{
            font-size: 12px;
        }

        .card-container{
            display:flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 100px;
            gap: 20px;
            flex:1;
        }

        .card{
            width: 325px;
            background-color: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0px 2px 4px rgba(0,0,0,0.2);
            margin: 20px;
            transition: transform 0.3s ease, 
            box-shadow 0.3s ease;
        }

        .card i{
            display: block;
            font-size: 4rem;
            text-align: center;
            padding: 20px 0;
            color: #e63946;
            padding-left: 140px;
        }

        .card-content{
            padding: 16px;
        }

        .card-content h3{
            font-size: 24px;
            text-align: center;
            margin-bottom: 8px;
            color: #f1f1f1;
        }

        .card-content p{
            color: #aaa;
            font-size: 14px;
            line-height: 1.4;
            text-align: center;
        }

        .card:hover{
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4),
                        0 0 50px #e63946;

        }

        #title{
            display:flex;
            justify-content: center;
            padding-top: 200px;
            color: #e63946;
        }

        .wave span {
            display:flex;
            justify-content: center;
            font-size: 40px;
            font-weight: bold;
            animation: wave 1.5s ease-in-out infinite;
        }

    /* Stagger the animation */
        .wave span:nth-child(1)  { animation-delay: 0s; }
        .wave span:nth-child(2)  { animation-delay: 0.1s; }
        .wave span:nth-child(3)  { animation-delay: 0.2s; }
        .wave span:nth-child(4)  { animation-delay: 0.3s; }
        .wave span:nth-child(5)  { animation-delay: 0.4s; }
        .wave span:nth-child(6)  { animation-delay: 0.5s; }
        .wave span:nth-child(7)  { animation-delay: 0.6s; }
        .wave span:nth-child(8)  { animation-delay: 0.7s; }
        .wave span:nth-child(9)  { animation-delay: 0.8s; }
        .wave span:nth-child(10) { animation-delay: 0.9s; }

        @keyframes wave {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-15px); }
        }

      
</style>
