<style>

 *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            border: none;
            outline: none;
            font-family:'Poppins',sans-serif;
        }

        html{
            font-size: 62.5%;
        }

        body{
            width: 100%;
            height: 100vh;
            overflow-x: hidden;
            background-color: black;
            color: white;
        }

        header{
            margin-top: 20px;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 9%;
            background-color: transparent;
            filter: drop-shadow(10px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

         .logo{
            font-size: 3rem;
            color: #b74b4b;
            font-weight: 800;
            cursor: pointer;
            transition: 0.5s ease;
        }

        .logo:hover{
            transform:scale(1.1);
        }

        nav a{
            font-size: 1.8rem;
            color: white;
            margin-left: 4rem;
            font-weight: 500;
            transition: 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        nav a:hover,
        nav a.active{
            color: #b74b4b;
            border-bottom: 3px solid #b74b4b;
        }

        @media(max-width:955px){
            nav{
                position: absolute;
                top: 0;
                right: 0;
                width: 30%;
                border-left: 3px solid #b74b4b;
                border-bottom: 3px solid #b74b4b;
                border-bottom-left-radius: 2rem;
                padding: 1rem solid;
                background-color: #161616;
                border-top: 0.1rem solid rgba(0,0,0,0.1);
            }

            nav.active{
                display: block;
            }

            nav a{
                display: block;
                font-size: 2rem;
                margin: 3rem 0;
            }

            nav a:hover,
            nav a.active{
                padding: 1rem;
                border-radius: 0.5rem;
                border-bottom: 0.5rem solid #b74b4b;
            }
        }

         /*The styling for my social icons*/
        .social-icons a{
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 4rem;
            height: 4rem;
            background-color: transparent;
            border: 0.2rem solid #b74b4b;
            font-size: 2rem;
            border-radius: 50%;
            margin: 3rem 1.5rem 3rem 0;
            transition: 0.3s ease;
            color: #b74b4b;
 
        }

        .social-icons a:hover{
            color:black;
            transform:scale(1.3) translateY(-5px);
            background-color:#b74b4b;
            box-shadow: 0 0 25px #b74b4b;
        }

        footer{
            position: absolute;
            bottom: 0;
            align-items: center;
            text-align: center;
            width: 100%;
            margin: 0 auto;
            justify-content: center;
            border-top: 1px solid rgb(80, 80, 80);
            padding-top: 20px; 
            background-color: rgb(80, 80, 80);
            padding-bottom: 20px;
        }

        #copyright{
            font-size: 12px;
        }

</style>
